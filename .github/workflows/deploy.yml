name: Deploy to surge.sh

on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - run: npm ci
      - run: npm run build
      - run: npx surge dist valur.surge.sh --token ${{ secrets.SURGE_TOKEN }}
